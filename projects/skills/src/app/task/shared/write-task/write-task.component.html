<!-- @format -->

<div class="write-task" [class.write-task--hasVideo]="!!sanitizedFileUrl">
  <div class="write-task__header">
    @if (!sanitizedFileUrl) {
    <p class="write-task__text text-body-bold-12">{{ data.text | truncate: 80 }}</p>
    }
    <div
      class="write-task__description text-body-12"
      [class.write-task__description--hasVideo]="!!sanitizedFileUrl"
    >
      @if (sanitizedFileUrl) {
      <iframe
        [src]="sanitizedFileUrl"
        width="397px"
        height="223px"
        frameborder="0"
        allowfullscreen
        allowtransparency="true"
      ></iframe>
      }
      <div [innerHTML]="description | truncate: 700"></div>
    </div>
  </div>

  <div class="write-task__content">
    <p class="write-task__input text-body-12">ответ</p>
    <div class="write-task__input">
      <textarea
        class="write-task__textarea text-body-12"
        rows="2"
        (keydown)="onKeyUp($event)"
        placeholder="ваш ответ"
      ></textarea>
    </div>
  </div>
</div>
