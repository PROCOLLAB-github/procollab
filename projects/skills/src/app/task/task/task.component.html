<!-- @format -->

@if (skillStepsResponse()) {
<div class="task">
  <div class="task__wrapper">
    <div class="task__tasks">
      <p class="task__skill-name text-body-bold-14">{{ skillStepsResponse()!.skillName }}</p>
      <p class="task__name text-body-bold-14">{{ skillStepsResponse()!.tasks[0].name }}</p>
    </div>

    <div class="task__progress">
      @for (id of taskIds(); track $index) {
      <div
        class="progress__task"
        [attr.data-id]="id"
        [ngClass]="{
          'progress__task--done': doneTasks().includes(id) || taskService.currentTaskDone(),
          'progress__task--current': currentSubTaskId() === id
        }"
      >
        <p class="text-body-12">{{ $index + 1 }}</p>
      </div>
      }
    </div>
  </div>

  <div class="task__main" [class.task__main--]="">
    <router-outlet></router-outlet>
  </div>
</div>
}
