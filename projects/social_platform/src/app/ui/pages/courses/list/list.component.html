<!-- @format -->

<div class="courses">
  @if (loading()) {
  <div class="loading">
    <app-loader size="125px" color="accent"></app-loader>
  </div>
  } @else if (coursesList().length) {
  <div class="courses__list">
    @for (course of coursesList(); track course.id) {
    <a [routerLink]="['/office/courses', course.id]">
      <app-course [course]="course"></app-course>
    </a>
    }
  </div>
  }
</div>
