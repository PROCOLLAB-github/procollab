<!-- @format -->

<div class="complete">
  <div class="complete__block">
    <img alt="complete img" src="/assets/images/courses/complete.svg" />

    <div class="complete__text">
      <p class="text-body-12-bold">поздравляем!</p>
      <p class="text-body-12">урок пройден</p>
    </div>

    @if (appWidth > 1000) {
    <app-button
      class="complete__button"
      customTypographyClass="text-body-12"
      size="medium"
      (click)="routeToCourses()"
      >отлично</app-button
    >
    }
  </div>
</div>
@if (appWidth < 1000) {
<app-button
  class="complete__button"
  customTypographyClass="text-body-12"
  [size]="appWidth > 1000 ? 'medium' : 'big'"
  (click)="routeToCourses()"
  >отлично</app-button
>
}
