<!-- @format -->

<div class="approve__approves--people">
  @for (approve of approves().slice(0, 3); track $index) {
    <app-avatar class="approve__avatar" [url]="approve.confirmedBy.avatar" [size]="15"></app-avatar>
  }

  @if (approves().length > 3) {
    <p class="approve__text text-body-6">
      {{
        approves().length +
          " " +
          (approves().length | pluralize: ["человек", "человека", "человек"])
      }}
    </p>
  }
</div>
